- type: entity
  parent: StorageBin
  id: Constructor
  name: constructor
  description: The machine putting assistants out of a job, it can build anything using supplied materials.
  components:
  # Appearance
  - type: Sprite
    sprite: _Goobstation/Structures/Machines/constructor.rsi
  # Physics
  - type: Transform
    noRot: false
  - type: Rotatable
    rotateWhileAnchored: true
  # Construction
  - type: Machine
    board: ConstructorCircuitboard
  # UI
  - type: ActivatableUI
    key: enum.ConstructorUiKey.Key
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.ConstructorUiKey.Key:
        type: ConstructorBUI
  # Constructor
  - type: Constructor
  - type: DoAfter
  - type: StartableMachine
  - type: DeviceLinkSink
    ports:
    - Start
    - AutoStart
  - type: DeviceLinkSource
    ports:
    - Started
    - Completed
    - Failed
  # Power
  - type: ApcPowerReceiver
    powerLoad: 1000
  - type: KnowledgeGrant
    skills:
      HandmadeKnowledge: 100
      SurvivalKnowledge: 100
      WeaponsKnowledge: 100
      TechnologyKnowledge: 100
      MaterialsKnowledge: 100
      DoorsKnowledge: 100
      AirlocksKnowledge: 100
      ToysKnowledge: 100
      BotsKnowledge: 100
      FurnitureKnowledge: 100
      InfrastructureKnowledge: 100
      ElectronicsKnowledge: 100
      WallsKnowledge: 100
      ScienceKnowledge: 100
      WindowsKnowledge: 100
      SmokeablesKnowledge: 100
