- type: entity
  parent: BaseItem
  id: BookSkillbook
  abstract: true
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Misc/cqc_manual.rsi
    layers:
    - state: icon
  - type: StaticPrice
    price: 20
  - type: Tag
    tags:
    - Book
  - type: Item
    size: Small

- type: entity
  parent: BookSkillbook
  id: BookStrength
  name: old book
  suffix: strength
  description: A small, black manual. There are drawn instructions of curl-ups and sit-ups.
  components:
  - type: KnowledgeGrantOnUse
    skills:
      StrengthKnowledge: 10
    experience:
      StrengthKnowledge: 1
    doAfter: 2

